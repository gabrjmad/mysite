<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>GABRIELLE MADEO – Tunnel Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Canvas effetti fumo -->
  <canvas id="smoke-canvas"></canvas>

  <!-- Pannello info cristalli -->
  <div id="info-panel">
    <span id="close-panel">✕</span>
    <h3 id="panel-title"></h3>
    <p id="panel-body"></p>
  </div>

  <!-- HERO: titolo statico + bolle -->
  <section id="hero">
    <h1 id="logo-title">GABRIELE MADEO</h1>
    <p id="hero-sub">Designer &amp; Developer · Esperienze 3D sul Web</p>
    <div id="bubbles-container"></div>
  </section>

  <!-- PORTAL: porta + lettere + tunnel -->
  <section id="portal">
    <div id="portal-door"></div>
    <div id="portal-tunnel">
      <div class="tunnel-wall wall-front"></div>
      <div class="tunnel-wall wall-back"></div>
      <div class="tunnel-wall wall-left"></div>
      <div class="tunnel-wall wall-right"></div>
      <div class="tunnel-wall wall-top"></div>
      <div class="tunnel-wall wall-bottom"></div>
    </div>
  </section>

  <!-- ICE: forme finali interattive -->
  <section id="ice"></section>

  <footer>© 2026 GABRIELE MADEO – All rights reserved</footer>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
