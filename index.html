<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GABRIELE MADEO</title>
  <style>
    /* ── BASE ── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: #000;
      color: #fff;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      overflow-x: hidden;
      cursor: none;
    }

    /* ── SMOKE CANVAS ── */
    #smoke-canvas {
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 99999;
      mix-blend-mode: screen;
    }

    /* ── SECTIONS ── */
    section {
      position: relative;
      width: 100vw;
      overflow: hidden;
    }

    /* ── HERO (3D CSS logo + tunnel) ── */
    #hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1400px;
      background: radial-gradient(ellipse at 50% 60%, #000 0%, #000 100%);
      position: relative;
    }

    #tunnel {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      transform-style: preserve-3d;
      perspective: 2000px;
    }

    #logo-stage {
      transform-style: preserve-3d;
      position: relative;
      display: inline-block;
      transition: transform 0.1s ease;
    }

    .logo-face {
      font-size: clamp(2rem, 6vw, 5.5rem);
      font-weight: 900;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      white-space: nowrap;
      user-select: none;
      position: absolute;
      top: 0; left: 0;
    }
    .logo-face.front {
      position: relative;
      color: #00ffff;
      text-shadow:
        0 0 10px rgba(0,255,255,1),
        0 0 30px rgba(0,255,255,0.6),
        0 0 70px rgba(0,200,255,0.3);
    }

    /* tunnel walls */
    .tunnel-wall {
      position: absolute;
      width: 100vw; height: 100vh;
      background: linear-gradient(90deg, transparent 49%, rgba(0,255,255,0.03) 50%, transparent 51%);
      transform-origin: center center;
      will-change: transform;
    }
    .tunnel-wall.left { transform: rotateY(-90deg) translateZ(-500px); }
    .tunnel-wall.right { transform: rotateY(90deg) translateZ(-500px); }
    .tunnel-wall.top { transform: rotateX(90deg) translateZ(-500px); }
    .tunnel-wall.bottom { transform: rotateX(-90deg) translateZ(-500px); }

    /* hero sub-line */
    #hero-sub {
      position: absolute;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.8rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      opacity: 0.35;
    }

    /* ── PORTAL ── */
    #portal {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    /* ── ICE SECTION ── */
    #ice {
      height: 100vh;
      background: #000;
    }
    #ice canvas { display: block; }

    /* ── INFO PANEL ── */
    #info-panel {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%) scale(0.82);
      opacity: 0;
      pointer-events: none;
      background: rgba(0,0,0,0.95);
      border: 1px solid rgba(0,255,255,0.35);
      border-radius: 20px;
      padding: 2.4rem 2.8rem;
      width: min(400px, 92vw);
      z-index: 5000;
      backdrop-filter: blur(18px);
      box-shadow: 0 0 70px rgba(0,255,255,0.2);
      transition:
        transform 0.38s cubic-bezier(.34,1.56,.64,1),
        opacity   0.25s ease;
    }
    #info-panel.open {
      transform: translate(-50%,-50%) scale(1);
      opacity: 1;
      pointer-events: auto;
    }
    #info-panel h3 {
      color: #00ffff;
      font-size: 1.15rem;
      letter-spacing: 0.12em;
      margin-bottom: 1rem;
    }
    #info-panel p {
      line-height: 1.75;
      font-size: 0.91rem;
      opacity: 0.82;
      white-space: pre-line;
    }
    #close-panel {
      position: absolute;
      top: 1rem; right: 1.3rem;
      font-size: 1.05rem;
      cursor: pointer;
      opacity: 0.55;
      transition: opacity 0.2s;
    }
    #close-panel:hover { opacity: 1; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 3.5rem 1rem;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.25;
      background: #000;
    }
  </style>
</head>
<body>

  <!-- CURSOR SMOKE -->
  <canvas id="smoke-canvas"></canvas>

  <!-- INFO PANEL -->
  <div id="info-panel">
    <span id="close-panel">✕</span>
    <h3 id="panel-title"></h3>
    <p  id="panel-body"></p>
  </div>

  <!-- S1 · HERO + TUNNEL -->
  <section id="hero">
    <div id="tunnel">
      <div class="tunnel-wall left"></div>
      <div class="tunnel-wall right"></div>
      <div class="tunnel-wall top"></div>
      <div class="tunnel-wall bottom"></div>
    </div>
    <div id="logo-stage"></div>
    <p id="hero-sub">Designer &amp; Developer · Milano</p>
  </section>

  <!-- S2 · PORTAL -->
  <section id="portal"></section>

  <!-- S3 · ICE OBJECTS -->
  <section id="ice"></section>

  <footer>© 2026 GABRIELE MADEO — All rights reserved</footer>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
  /* ====================================================
     A. CURSOR SMOKE (solo particelle, no ring)
  ==================================================== */
  const sc     = document.getElementById('smoke-canvas');
  const ctx    = sc.getContext('2d');
  let   mx = -300, my = -300;
  const pool = [];

  class SP {
    constructor(x,y){
      this.x  = x + (Math.random()-.5)*8;
      this.y  = y + (Math.random()-.5)*8;
      this.r  = 4 + Math.random()*10;
      this.vx = (Math.random()-.5)*1.4;
      this.vy = -(0.5 + Math.random()*1.6);
      this.a  = 0.18 + Math.random()*0.28;
      this.da = 0.011 + Math.random()*0.009;
      this.c  = Math.random()>.45 ? '0,230,255' : '160,160,220';
    }
    tick(){ this.x+=this.vx; this.y+=this.vy; this.r+=0.45; this.a-=this.da; }
    draw(){
      if(this.a<=0) return;
      const g = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r);
      g.addColorStop(0,`rgba(${this.c},${this.a})`);
      g.addColorStop(1,`rgba(${this.c},0)`);
      ctx.beginPath(); ctx.fillStyle = g;
      ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill();
    }
    dead(){ return this.a<=0; }
  }

  function scResize(){
    sc.width  = window.innerWidth;
    sc.height = window.innerHeight;
  }
  scResize(); window.addEventListener('resize', scResize);

  function smokeLoop(){
    ctx.clearRect(0,0,sc.width,sc.height);
    for(let i=pool.length-1;i>=0;i--){
      pool[i].tick(); pool[i].draw();
      if(pool[i].dead()) pool.splice(i,1);
    }
    requestAnimationFrame(smokeLoop);
  }
  smokeLoop();

  document.addEventListener('mousemove', e=>{
    mx=e.clientX; my=e.clientY;
    for(let i=0;i<6;i++) pool.push(new SP(mx,my));
  });
  document.addEventListener('touchmove', e=>{
    const t=e.touches[0];
    for(let i=0;i<6;i++) pool.push(new SP(t.clientX,t.clientY));
  },{passive:true});


  /* ====================================================
     B. SCROLL TUNNEL + LOGO ROTATION
  ==================================================== */
  const LABEL  = 'GABRIELE MADEO';
  const stage  = document.getElementById('logo-stage');
  const tunnel = document.getElementById('tunnel');

  /* CSS 3D logo layers */
  for(let i=28; i>=1; i--){
    const el = document.createElement('div');
    el.className = 'logo-face';
    el.textContent = LABEL;
    const t = i/28;
    el.style.transform = `translateZ(${-i*2.8}px)`;
    el.style.color = `rgba(0,${Math.floor(200-t*180)},${Math.floor(240-t*200)},${1-t*0.72})`;
    stage.appendChild(el);
  }
  const front = document.createElement('div');
  front.className = 'logo-face front';
  front.textContent = LABEL;
  stage.appendChild(front);

  /* scroll-driven tunnel + logo spin */
  let scrY=0;
  function onScroll(){
    scrY = window.scrollY;
    const prog = Math.min(1, scrY / window.innerHeight);
    
    /* tunnel rotation */
    const tunSpin = prog * -360;
    tunnel.style.transform = `rotateY(${tunSpin}deg)`;
    
    /* logo spin */
    const logoSpin = prog * 720;
    stage.style.transform = `rotateY(${logoSpin}deg)`;
    
    /* tunnel depth */
    const dep = 500 + prog * 800;
    document.querySelectorAll('.tunnel-wall').forEach(wall=>{
      wall.style.transform = wall.classList.contains('left') || wall.classList.contains('right')
        ? `rotateY(${wall.classList.contains('left') ? '-90' : '90'}deg) translateZ(${-dep}px)`
        : `rotateX(${wall.classList.contains('top') ? '90' : '-90'}deg) translateZ(${-dep}px)`;
    });
  }
  window.addEventListener('scroll', onScroll, {passive:true});
  onScroll();

  /* mouse parallax (lighter) */
  let lrx=0,lry=0, lrxt=0,lryt=0;
  document.addEventListener('mousemove', e=>{
    lryt = ((e.clientX/window.innerWidth)*2-1)*12;
    lrxt = -((e.clientY/window.innerHeight)*2-1)*8;
  });
  (function animLogo(){
    lrx += (lrxt-lrx)*0.065;
    lry += (lryt-lry)*0.065;
    stage.style.transform += ` rotateX(${lrx}deg) rotateY(${lry}deg)`;
    requestAnimationFrame(animLogo);
  })();


  /* ====================================================
     C. ICE CRYSTALS — INTERATTIVI + PARTICELLE CONTINUOUS
  ==================================================== */
  const iceSec = document.getElementById('ice');

  const iceScene = new THREE.Scene();
  const iceCam   = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 100);
  iceCam.position.set(0, 0, 9);

  const iceRen = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  iceRen.setSize(window.innerWidth, window.innerHeight);
  iceRen.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  iceSec.appendChild(iceRen.domElement);

  /* Lights */
  iceScene.add(new THREE.AmbientLight(0x001122, 8));
  const pl1=new THREE.PointLight(0x00ffff,12,30); pl1.position.set( 5, 5, 5); iceScene.add(pl1);
  const pl2=new THREE.PointLight(0x0044ff,8,20); pl2.position.set(-5,-3, 3); iceScene.add(pl2);
  const pl3=new THREE.PointLight(0xffffff,4,15); pl3.position.set( 0, 6,-4); iceScene.add(pl3);

  /* Ice data */
  const ICE_DATA = [
    { t:'CHI SONO',    b:'Designer & Sviluppatore con passione per esperienze 3D immersive, motion design e interazioni digitali creative.', col:0x00ffff },
    { t:'COSA FACCIO', b:'Realizzo siti web interattivi in WebGL, animazioni GSAP, installazioni digitali e identità di brand in movimento.', col:0x0088ff },
    { t:'PORTFOLIO',   b:'50+ progetti in 5 anni: landing page animate, esperienze AR/VR e identità visive per brand internazionali.', col:0x00ccaa },
    { t:'CONTATTI',    b:'gabriele@madeo.design\n+39 333 123 4567\nMilano, Italia', col:0x4499ff },
    { t:'SKILLS',      b:'Three.js · GSAP · React · WebGL\nAfter Effects · Blender · Cinema 4D · Motion Design', col:0x00aadd },
  ];

  const crystals=[];
  ICE_DATA.forEach((d,i)=>{
    const G   = new THREE.Group();
    const geo = new THREE.OctahedronGeometry(0.95+Math.random()*0.45, 1);
    const mat = new THREE.MeshPhongMaterial({
      color:d.col, transparent:true, opacity:0.28, shininess:160, specular:0xffffff });
    const wm  = new THREE.MeshBasicMaterial({
      color:d.col, wireframe:true, transparent:true, opacity:0.65 });
    G.add(new THREE.Mesh(geo,mat));
    G.add(new THREE.Mesh(geo.clone(),wm));
    const a=(i/ICE_DATA.length)*Math.PI*2;
    G.position.set(Math.cos(a)*4, Math.sin(a)*2.2, (Math.random()-.5)*2.5);
    G.userData = {...d, baseY:G.position.y, phase:Math.random()*Math.PI*2, hover:0 };
    iceScene.add(G);
    crystals.push(G);
  });

  /* Continuous particle field (più dense) */
  const pPos=new Float32Array(800*3);
  for(let i=0;i<800;i++){
    pPos[i*3]  =(Math.random()-.5)*22;
    pPos[i*3+1]=(Math.random()-.5)*16;
    pPos[i*3+2]=(Math.random()-.5)*16;
  }
  const pGeo=new THREE.BufferGeometry();
  pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
  iceScene.add(new THREE.Points(pGeo,
    new THREE.PointsMaterial({color:0x00ffff,size:0.06,transparent:true,opacity:0.55})));

  /* Raycaster per hover */
  const ray=new THREE.Raycaster();
  const mp2=new THREE.Vector2();
  const iceMeshes=crystals.map(c=>c.children[0]);
  const mouseOver = new Set();

  /* Click → info panel */
  iceRen.domElement.addEventListener('click', e=>{
    const r=iceSec.getBoundingClientRect();
    mp2.x= ((e.clientX-r.left)/r.width )*2-1;
    mp2.y=-((e.clientY-r.top )/r.height)*2+1;
    ray.setFromCamera(mp2,iceCam);
    const hits=ray.intersectObjects(iceMeshes);
    if(hits.length){
      const d=hits[0].object.parent.userData;
      document.getElementById('panel-title').textContent=d.t;
      document.getElementById('panel-body').textContent =d.b;
      document.getElementById('info-panel').classList.add('open');
    }
  });

  /* Mouse hover → glow + scale */
  iceRen.domElement.addEventListener('mousemove', e=>{
    const r=iceSec.getBoundingClientRect();
    mp2.x= ((e.clientX-r.left)/r.width )*2-1;
    mp2.y=-((e.clientY-r.top )/r.height)*2+1;
    ray.setFromCamera(mp2,iceCam);
    const hits=ray.intersectObjects(iceMeshes);
    mouseOver.forEach(i=>{
      crystals[i].children[0].material.opacity = 0.28;
      crystals[i].children[1].material.opacity = 0.65;
      crystals[i].scale.setScalar(1);
    });
    mouseOver.clear();
    if(hits.length){
      const idx = iceMeshes.indexOf(hits[0].object);
      mouseOver.add(idx);
      crystals[idx].children[0].material.opacity = 0.55;
      crystals[idx].children[1].material.opacity = 0.95;
      crystals[idx].scale.setScalar(1.35);
      /* extra smoke */
      for(let i=0;i<12;i++) pool.push(new SP(e.clientX,e.clientY));
    }
  });

  document.getElementById('close-panel').addEventListener('click',()=>
    document.getElementById('info-panel').classList.remove('open'));

  /* Animation loop */
  const clk=new THREE.Clock();
  const camT={x:0,y:0};
  document.addEventListener('mousemove',e=>{
    camT.x=(e.clientX/window.innerWidth*2-1)*0.7;
    camT.y=-(e.clientY/window.innerHeight*2-1)*0.5;
  });

  (function animIce(){
    requestAnimationFrame(animIce);
    const t=clk.getElapsedTime();
    crystals.forEach((c,i)=>{
      c.rotation.x+=0.004;
      c.rotation.y+=0.006;
      c.position.y=c.userData.baseY+Math.sin(t*0.6+c.userData.phase)*0.42;
    });
    iceCam.position.x+=(camT.x-iceCam.position.x)*0.035;
    iceCam.position.y+=(camT.y-iceCam.position.y)*0.035;
    iceCam.lookAt(0,0,0);
    iceRen.render(iceScene,iceCam);
  })();

  /* Resize */
  window.addEventListener('resize',()=>{
    scResize();
    iceCam.aspect=window.innerWidth/window.innerHeight;
    iceCam.updateProjectionMatrix();
    iceRen.setSize(window.innerWidth,window.innerHeight);
    onScroll();
  });
  </script>
</body>
</html>
